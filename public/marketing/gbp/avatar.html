<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>russle GBP avatar (720 × 720)</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #2a2620; }
  body {
    font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    padding: 40px;
    box-sizing: border-box;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-label {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .asset {
    width: 720px;
    height: 720px;
    background: #F8F7F5;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
  }
  /* Variant 1: wordmark + dot, centred */
  .lockup {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .lockup .wordmark {
    font-size: 144px;
    font-weight: 500;
    letter-spacing: -4px;
    text-transform: lowercase;
    line-height: 1;
    color: #1A1410;
  }
  .lockup .dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #DF5613;
  }
  /* Variant 2: accent-ground with cream wordmark */
  .asset.inverse { background: #DF5613; }
  .asset.inverse .lockup .wordmark { color: #F8F7F5; }
  .asset.inverse .lockup .dot { background: #F8F7F5; }
  /* Variant 3: dot-only mark (recognisable at tiny sizes) */
  .mark {
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: #DF5613;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="stage">
  <p class="stage-label">A · Wordmark on cream · 720 × 720</p>
  <div class="asset">
    <div class="lockup">
      <span class="wordmark">russle</span>
      <span class="dot"></span>
    </div>
  </div>
</div>

<div class="stage">
  <p class="stage-label">B · Inverse on accent · 720 × 720</p>
  <div class="asset inverse">
    <div class="lockup">
      <span class="wordmark">russle</span>
      <span class="dot"></span>
    </div>
  </div>
</div>

<div class="stage">
  <p class="stage-label">C · Dot mark only (for tiny avatars) · 720 × 720</p>
  <div class="asset">
    <div class="mark"></div>
  </div>
</div>
</body>
</html>
